name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    python:
        name: Python backend (test)
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: backend-python

        services:
            postgres:
                image: postgres:16-alpine
                env:
                    POSTGRES_USER: jobuser
                    POSTGRES_PASSWORD: jobpassword
                    POSTGRES_DB: jobsdb
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd "pg_isready -U jobuser -d jobsdb"
                    --health-interval 5s
                    --health-timeout 5s
                    --health-retries 10

        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-python@v5
              with:
                  python-version: "3.12"
                  cache: pip
                  cache-dependency-path: backend-python/requirements.txt

            - name: Install dependencies
              run: pip install -r requirements.txt -r requirements-dev.txt

            - name: Import check
              run: |
                  python -c "import app.tasks, app.celery_app, app.schemas, app.models; print('python backend imports OK')"

            - name: Run tests
              env:
                  TEST_DATABASE_URL: postgresql://jobuser:jobpassword@localhost:5432/jobsdb
                  DATABASE_URL: postgresql://jobuser:jobpassword@localhost:5432/jobsdb
              run: pytest tests/ -v

    node:
        name: Node backend (test)
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: backend-node
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: npm
                  cache-dependency-path: backend-node/package-lock.json

            - name: Install dependencies
              run: npm ci

            - name: Build (tsc)
              run: npm run build

            - name: Run tests
              env:
                  UPLOAD_DIR: /tmp/node-test-uploads
              run: npm test
